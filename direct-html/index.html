<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SJTU HTML PPT Template</title>
    <link rel="stylesheet" href="../core/sjtu-ppt.css">
    <script defer src="../core/sjtu-ppt-core.js"></script>
    <script defer src="basic-slides.js"></script>
  </head>
  <body>
    <main class="deck-shell" aria-live="polite">
      <section id="deck" class="deck" aria-label="SJTU presentation"></section>
      <nav class="deck-controls" aria-label="Presentation controls">
        <button class="icon-button" id="prev-slide" type="button" aria-label="Previous slide" title="Previous slide">
          <span aria-hidden="true">‹</span>
        </button>
        <span id="slide-status" class="slide-status">1 / 1</span>
        <button class="icon-button" id="next-slide" type="button" aria-label="Next slide" title="Next slide">
          <span aria-hidden="true">›</span>
        </button>
        <button class="icon-button" id="toggle-fullscreen" type="button" aria-label="Fullscreen" title="Fullscreen">
          <span aria-hidden="true">⛶</span>
        </button>
      </nav>
    </main>
  </body>
</html>

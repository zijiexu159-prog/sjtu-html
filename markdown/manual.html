# 快速开始
## 文件位置

--- 推荐工作流[2][0.45,0.55]

### 写稿文件
- 把正文写在 `.sjtu.md` 文件中。
- 推荐从 `markdown/example.sjtu.md` 或 `markdown/touying-main-complete.sjtu.md` 复制开始。
- 不需要手写 JavaScript。

### 转换命令
```powershell
cd html-template
node core/build-sjtu-markup.js markdown/example.sjtu.md markdown/example.html
```

生成的 HTML 可以直接双击打开。

$$

```markdown

`||` 切换页面大栏；`|||` 只在当前 `###` 或 `####` 对象内部分栏。

# 动画与内容块
## 内容块

--- 逐步显示：写法[1]

```markdown
### 推导过程
#### 第一步[1-2][slide-right]
初始形式

#### 第二步[3-][zoom]
化简结果
```

`####` 用于同一位置的内容替换。`[1-2]` 表示第 1 到 2 步显示，第二个 `[]` 可以单独指定该 step 的动画效果。

--- 逐步显示：效果[1]

### 推导过程
#### 第一步[1-2][slide-right]
初始形式

#### 第二步[3-][zoom]
化简结果

--- 飞移动画：写法[1]

```markdown
--- 飞移动画[2]

### 移动块[only=1][move=judge][fade]
第 1 步在左栏。

||

### 移动块[step=2][move=judge][fade]
第 2 步飞到右栏。
```

两个内容块使用同一个 `move=id`，模板会按真实位置自动做飞移动画。

--- 飞移动画：效果[2]

### 移动块[only=1][move=judge][fade]

||

### 移动块[step=2][move=judge][fade]

# 公式、图片与备注
## 常用内容

--- 公式编号与引用：写法[1]

```markdown
$$ {#burgers}
u_t + u u_x = \nu u_{xx}
$$

由 @eq:burgers 可知粘性项影响正则性。
```

普通 `$$` 公式只居中显示并参与编号，不会自动加红色公式框。

--- 公式编号与引用：效果[2]

$$ {#burgers-manual}
u_t + u u_x = \nu u_{xx}
$$

||

由 @eq:burgers-manual 可知粘性项影响正则性。

普通段落、列表和内容框里可以直接写行内公式 $E = mc^2$。

--- 公式局部出现：写法[1]

```markdown
$$
E = mc^2 \pause{2}{+ \int_0^1 x^2\,dx}
$$
```

`\pause{2}{...}`、`\uncover{2}{...}` 和 `\sjtupause{2}{...}` 是等价写法；隐藏时仍保留同样宽度。

--- 公式局部出现：效果[1]

$$
E = mc^2 \pause{2}{+ \int_0^1 x^2\,dx}
$$

--- 公式框：写法[1]

```markdown
::: formula 控制方程
$$
u_t + u u_x = \nu u_{xx}
$$
:::
```

--- 公式框：效果[1]

$$

:::

--- 参考文献与脚注：写法[1]

```markdown
% bibliography: references.bib

正文引用文献 @cite:turing1950，并插入脚注[^demo-note]。

```

`.bib` 文件会在构建时被内联进 HTML；点击文献编号会跳到参考文献页，按 `R` 返回。
